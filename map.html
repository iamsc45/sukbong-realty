<script>
var TYPE={apt:["아파트","#2554E0"],offi:["오피스텔","#7A5AF8"],villa:["연립·다세대","#0FA98A"],
  house:["단독·다가구","#6E6E6A"],bldg:["빌딩","#D4573F"],comm:["구분상가·오피스","#E8A13A"],land:["토지","#4C9A4C"]};
var Z_DETAIL=13, Z_POINT=15, Z_NAME=16;
var curT='all', curU='all', curD='all', curSido='all', curSgg='all';
try{var P0=new URLSearchParams(location.search);var t0=P0.get('t');if(t0&&TYPE[t0])curT=t0;
var u0=P0.get('u');if(u0==='매매'||u0==='전세'||u0==='월세')curU=u0;}catch(e){}
/* 상세 필터 상태 (매매가·보증금·월세·면적·연식·층) — fXc는 직접 입력 [최소,최대+1) 만원 */
var fS='all', fB='all', fW='all', fA='all', fY='all', fF='all';
var fSc=null, fBc=null, fWc=null;
var FSR={s1:[0,50000],s2:[50000,100000],s3:[100000,200000],s4:[200000,1e15]};
var FBR={b1:[0,10000],b2:[10000,30000],b3:[30000,60000],b4:[60000,1e15]};
var FWR={w1:[0,50],w2:[50,100],w3:[100,200],w4:[200,1e9]};
var FAR={a1:[0,60],a2:[60,85],a3:[85,115],a4:[115,1e9]};
var CURY=new Date().getFullYear();
function ptYear(pt){if(pt._y===undefined){var m=/(19|20)\d{2}/.exec(pt.extra||'');pt._y=m?+m[0]:null;}return pt._y;}
function regionPass(r){if(curSgg!=='all')return r.code===curSgg;if(curSido!=='all')return r.sido===curSido;return true;}
var map=L.map('map',{minZoom:9}).setView([37.55,126.98],11);
var baseV=L.tileLayer('https://api.vworld.kr/req/wmts/1.0.0/EBC23601-6E41-3269-9ECB-821DEECCF3F0/Base/{z}/{y}/{x}.png',
  {attribution:'&copy; VWorld(국토교통부)',maxZoom:19,maxNativeZoom:18,minZoom:6}).addTo(map);
var _te=0;
baseV.on('tileerror',function(){if(++_te===12){map.removeLayer(baseV);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    {attribution:'&copy; OpenStreetMap &copy; CARTO',maxZoom:19}).addTo(map);}});
var layer=L.layerGroup().addTo(map);
function go(lat,lng,z){try{map.flyTo([lat,lng],z,{duration:.6});}catch(e){try{map.setView([lat,lng],z,{animate:false});}catch(e2){}}}
var loading={}, loaded={};

function fmtEok(man){var e=man/10000;return (e>=10?e.toFixed(1):e.toFixed(2)).replace(/\.?0+$/,'')+'억';}
function priceLabel(tx){
  if(tx.u==='매매')return fmtEok(tx.p);
  if(tx.u==='전세')return '전세 '+fmtEok(tx.p);
  return '월 '+(tx.p>=10000?fmtEok(tx.p):Math.round(tx.p).toLocaleString())+'/'+Math.round(tx.r);
}
function txBase(tx){
  /* 가격 외 공통 조건 (계약월·면적·층) — 거래 칩(curU)은 표시 단계에서 적용 */
  if(curD!=='all'&&tx.cd.indexOf(curD)!==0)return false;
  if(fA!=='all'){var ar=FAR[fA];if(tx.a==null||tx.a<ar[0]||tx.a>=ar[1])return false;}
  if(fF!=='all'){var fl=+tx.f;if(!fl||fl<(fF==='f5'?5:15))return false;}
  return true;
}
function inR(v,r){return v>=r[0]&&v<r[1];}
function ptTxs(pt){
  /* 맞춤 검색: 설정된 가격 필터 프로파일을 "같은 지점"이 전부 충족해야 표시.
     매매가 → 해당 범위 매매 거래 보유 / 보증금(+월세액) → 해당 조건 전·월세 거래 보유.
     매매가+보증금 조합 = 매매가 X이면서 전세(보증금) Y인 매물(갭 검색). */
  if(curT!=='all'&&pt.t!==curT)return [];
  if(fY!=='all'){
    var y=ptYear(pt);if(!y)return [];
    var ag=CURY-y;
    if(fY==='y5'&&ag>5)return [];
    if(fY==='y10'&&ag>10)return [];
    if(fY==='y20'&&ag<20)return [];
  }
  var base=pt.txs.filter(txBase);
  var S=fSc||(fS!=='all'?FSR[fS]:null);
  var B=fBc||(fB!=='all'?FBR[fB]:null);
  var W=fWc||(fW!=='all'?FWR[fW]:null);
  var out;
  if(!S&&!B&&!W){
    out=base;
  }else{
    var sale=S?base.filter(function(t){return t.u==='매매'&&inR(t.p,S);}):[];
    var rent=[];
    if(W)rent=base.filter(function(t){return t.u==='월세'&&inR(t.r||0,W)&&(!B||inR(t.p,B));});
    else if(B)rent=base.filter(function(t){return (t.u==='전세'||t.u==='월세')&&inR(t.p,B);});
    if(S&&!sale.length)return [];
    if((B||W)&&!rent.length)return [];
    out=sale.concat(rent);
    out.sort(function(a,b){return a.cd<b.cd?1:-1;});
  }
  if(curU!=='all')out=out.filter(function(t){return t.u===curU;});
  return out;
}
function setFcount(msg){var fc=document.getElementById('fcount');if(fc)fc.textContent=msg;}
function loadDetail(code,cb){
  if(loaded[code]||loading[code])return;
  if(!(SB.summary.regions.find(function(r){return r.code===code&&r.geo>0;})))return;
  loading[code]=1;
  var s=document.createElement('script');
  s.src='data/detail_'+code+'.js';
  s.onload=function(){loaded[code]=1;delete loading[code];if(cb)cb();};
  s.onerror=function(){delete loading[code];};
  document.body.appendChild(s);
}
function visibleRegions(){
  var b=map.getBounds(), m=0.065;  // 구 중심이 화면 밖이어도 ~7km 여유로 포함 (깊은 줌 대응)
  var eb=L.latLngBounds([b.getSouth()-m,b.getWest()-m],[b.getNorth()+m,b.getEast()+m]);
  return SB.summary.regions.filter(function(r){return r.lat&&regionPass(r)&&eb.contains([r.lat,r.lng]);});
}
function render(){
  layer.clearLayers();
  var z=map.getZoom(), nPt=0, nTx=0;
  document.getElementById('map').classList.toggle('names',z>=Z_NAME);
  if(z<Z_DETAIL){
    SB.summary.regions.forEach(function(r){
      if(!r.lat||!regionPass(r))return;
      var tot=(curT==='all'||!r.nt)?(r.n['매매']+r.n['전세']+r.n['월세']):(r.nt[curT]||0);
      if(!tot)return;
      var sz=Math.min(64,Math.max(42,Math.round(14*Math.log(tot||1))));
      var icon=L.divIcon({className:'',html:'<div class="clus" style="width:'+sz+'px;height:'+sz+'px">'
        +'<span class="cn">'+r.sgg.replace(/_/g,' ')+'</span><span class="cc">'+tot.toLocaleString()+'</span></div>',
        iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
      L.marker([r.lat,r.lng],{icon:icon}).on('click',function(){go(r.lat,r.lng,Z_DETAIL+1);}).addTo(layer);
      nPt++;nTx+=tot;
    });
    document.getElementById('stat').textContent='시군구 '+nPt+'곳 · '+nTx.toLocaleString()+'건 (확대하면 상세)';
    setFcount('상세 필터는 지도를 확대하면 적용됩니다');
    return;
  }
  var need=visibleRegions(), pending=0;
  need.forEach(function(r){if(!loaded[r.code]){pending++;loadDetail(r.code,render);}});
  var b=map.getBounds().pad(0.1);
  var pts=[];
  need.forEach(function(r){
    var d=SB.d[r.code]; if(!d)return;
    d.forEach(function(pt){
      if(!b.contains([pt.lat,pt.lng]))return;
      var txs=ptTxs(pt); if(!txs.length)return;
      pts.push({pt:pt,txs:txs});
    });
  });
  if(z<Z_POINT){
    var dongs={};
    pts.forEach(function(o){
      var k=o.pt.dong;
      var g=dongs[k]=dongs[k]||{lat:0,lng:0,n:0,tx:0};
      g.lat+=o.pt.lat;g.lng+=o.pt.lng;g.n++;g.tx+=o.txs.length;
    });
    Object.keys(dongs).forEach(function(k){
      var g=dongs[k],sz=Math.min(58,Math.max(38,Math.round(12*Math.log(g.tx+2))));
      var icon=L.divIcon({className:'',html:'<div class="clus dong" style="width:'+sz+'px;height:'+sz+'px">'
        +'<span class="cn">'+k+'</span><span class="cc">'+g.tx+'</span></div>',
        iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
      var la=g.lat/g.n,ln=g.lng/g.n;
      L.marker([la,ln],{icon:icon}).on('click',function(){go(la,ln,Z_POINT);}).addTo(layer);
      nPt++;nTx+=g.tx;
    });
    document.getElementById('stat').textContent='동 '+nPt+'곳 · '+nTx.toLocaleString()+'건'+(pending?' · 불러오는 중…':'');
    setFcount('화면 내 조건 일치 '+nTx.toLocaleString()+'건');
    return;
  }
  pts.forEach(function(o){
    var pt=o.pt,txs=o.txs,ti=TYPE[pt.t]||["기타","#6E6E6A"],col=ti[1],latest=txs[0];
    var icon=L.divIcon({className:'',html:'<div class="pricetag'+(pt.ax?' apx':'')+'" style="background:'+col+'">'
      +priceLabel(latest)+' <span class="n">'+(latest.a?Math.round(latest.a)+'㎡':'')+'</span>'
      +'<span class="nm">'+pt.name+'</span></div>',iconSize:null,iconAnchor:[30,12]});
    var rows=txs.map(function(t){
      var u=t.u+(t.k?'·'+t.k.slice(0,2):'');
      var sqm=(t.u==='매매'&&t.a)?'<div style="font-weight:normal;font-size:10px;color:#888">'+Math.round(t.p/t.a).toLocaleString()+'만/㎡</div>':'';
      return '<tr><td>'+t.cd.slice(5)+'</td><td>'+u+'</td><td>'+(t.a||'-')+'</td><td>'+t.f+'</td><td class="pr">'+priceLabel(t)+sqm+'</td></tr>';
    }).join('');
    var pop='<div class="pop"><h4>'+pt.name+'<span class="badge" style="background:'+col+'">'+ti[0]+'</span></h4>'
      +'<div class="meta">'+pt.dong+' '+pt.jibun+(pt.extra?' · '+pt.extra:'')+' · '+txs.length+'건'+(pt.ax?' · <b style="color:#D4573F">지번 비공개 — 동 단위 개략 위치</b>':'')+'</div>'
      +'<div class="tw"><table><thead><tr><th>계약</th><th>거래</th><th>면적㎡</th><th>층</th><th>가격</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
    var mk=L.marker([pt.lat,pt.lng],{icon:icon}).bindPopup(pop,{maxWidth:320});
    mk.on('popupopen',function(){var el=mk.getElement();if(el){var t=el.querySelector('.pricetag');if(t)t.classList.add('sel');}});
    mk.on('popupclose',function(){var el=mk.getElement();if(el){var t=el.querySelector('.pricetag');if(t)t.classList.remove('sel');}});
    mk.addTo(layer);
    nPt++;nTx+=txs.length;
  });
  document.getElementById('stat').textContent='지점 '+nPt+' · '+nTx.toLocaleString()+'건'+(pending?' · 불러오는 중…':'');
  setFcount('화면 내 조건 일치 '+nTx.toLocaleString()+'건');
}
/* 칩 */
function mkChips(elId,items,cur,setter){
  var el=document.getElementById(elId);
  items.forEach(function(it){
    var b=document.createElement('button');
    b.className='chip'+(it[0]===cur?' on':'');
    b.innerHTML=(it[2]?'<span class="dot" style="background:'+it[2]+'"></span>':'')+it[1];
    b.addEventListener('click',function(){
      el.querySelectorAll('.chip').forEach(function(x){x.classList.remove('on');});
      b.classList.add('on');setter(it[0]);render();});
    el.appendChild(b);
  });
}
mkChips('typechips',[['all','전체',null]].concat(Object.keys(TYPE).map(function(t){return [t,TYPE[t][0],TYPE[t][1]];})),curT,function(v){curT=v;});
mkChips('uchips',[['all','전체'],['매매','매매'],['전세','전세'],['월세','월세']],curU,function(v){curU=v;});
mkChips('dchips',[['all','전체'],['2026-07','7월'],['2026-06','6월']],'all',function(v){curD=v;});
/* 상세 필터 패널 */
(function(){
  var pn=document.getElementById('fpanel'),bt=document.getElementById('fbtn');
  function mark(){
    var n=((fSc||fS!=='all')?1:0)+((fBc||fB!=='all')?1:0)+((fWc||fW!=='all')?1:0)
      +(fA!=='all'?1:0)+(fY!=='all'?1:0)+(fF!=='all'?1:0);
    bt.textContent='필터'+(n?' '+n:'')+(pn.classList.contains('open')?' ▴':' ▾');
  }
  function grp(el,items,get,set){
    var box=document.getElementById(el);
    items.forEach(function(it){
      var b=document.createElement('button');b.type='button';
      b.className='chip'+(get()===it[0]?' on':'');b.textContent=it[1];
      b.addEventListener('click',function(){
        set(it[0]);
        box.querySelectorAll('.chip').forEach(function(x){x.classList.remove('on');});
        b.classList.add('on');mark();render();
      });
      box.appendChild(b);
    });
  }
  grp('fpS',[['all','전체'],['s1','5억 이하'],['s2','5~10억'],['s3','10~20억'],['s4','20억 이상']],function(){return fS;},function(v){fS=v;});
  grp('fpB',[['all','전체'],['b1','1억 이하'],['b2','1~3억'],['b3','3~6억'],['b4','6억 이상']],function(){return fB;},function(v){fB=v;});
  grp('fpW',[['all','전체'],['w1','50만 이하'],['w2','50~100만'],['w3','100~200만'],['w4','200만 이상']],function(){return fW;},function(v){fW=v;});
  grp('fpA',[['all','전체'],['a1','60㎡ 미만'],['a2','60~85㎡'],['a3','85~115㎡'],['a4','115㎡ 이상']],function(){return fA;},function(v){fA=v;});
  grp('fpY',[['all','전체'],['y5','5년 내 신축'],['y10','10년 내'],['y20','20년 이상']],function(){return fY;},function(v){fY=v;});
  grp('fpF',[['all','전체'],['f5','5층 이상'],['f15','15층 이상']],function(){return fF;},function(v){fF=v;});
  /* 직접 입력 (설정 시 해당 줄 프리셋 해제, 칩 클릭 시 직접 입력 해제) */
  function wireCustom(boxId,minId,maxId,mult,setC){
    var mi=document.getElementById(minId),ma=document.getElementById(maxId);
    function upd(){
      var lo=parseFloat(mi.value),hi=parseFloat(ma.value);
      var has=!(isNaN(lo)&&isNaN(hi));
      setC(has?[isNaN(lo)?0:Math.round(lo*mult),isNaN(hi)?1e15:Math.round(hi*mult)+1]:null);
      document.getElementById(boxId).querySelectorAll('.chip').forEach(function(x,i){
        x.classList.toggle('on',!has&&i===0);});
      mark();render();
    }
    mi.addEventListener('change',upd);ma.addEventListener('change',upd);
    document.getElementById(boxId).addEventListener('click',function(e){
      if(e.target.classList.contains('chip')){mi.value='';ma.value='';setC(null);}
    },true);
  }
  wireCustom('fpS','fSmin','fSmax',10000,function(v){fSc=v;if(v)fS='all';});
  wireCustom('fpB','fBmin','fBmax',10000,function(v){fBc=v;if(v)fB='all';});
  wireCustom('fpW','fWmin','fWmax',1,function(v){fWc=v;if(v)fW='all';});
  bt.addEventListener('click',function(){
    pn.classList.toggle('open');
    if(pn.classList.contains('open'))
      pn.style.top=(document.getElementById('bar').getBoundingClientRect().bottom+4)+'px';
    mark();
  });
  document.getElementById('freset').addEventListener('click',function(){
    fS=fB=fW=fA=fY=fF='all';fSc=fBc=fWc=null;
    ['fSmin','fSmax','fBmin','fBmax','fWmin','fWmax'].forEach(function(id){document.getElementById(id).value='';});
    ['fpS','fpB','fpW','fpA','fpY','fpF'].forEach(function(id){
      document.getElementById(id).querySelectorAll('.chip').forEach(function(x,i){x.classList.toggle('on',i===0);});
    });
    mark();render();
  });
  mark();
})();
/* 지역 선택 (기본 전체 · 선택 시 해당 지역만 표시) */
(function(){
  var sidos=[];
  SB.summary.regions.forEach(function(r){if(sidos.indexOf(r.sido)<0)sidos.push(r.sido);});
  var s1=document.getElementById('selSido'),s2=document.getElementById('selSgg');
  function opt(sel,v,label,dis){var o=document.createElement('option');o.value=v;o.textContent=label;o.disabled=!!dis;sel.appendChild(o);}
  opt(s1,'all','시/도 전체');
  sidos.sort().forEach(function(s){opt(s1,s,s);});
  function fill(){
    s2.innerHTML='';opt(s2,'all','시군구 전체');
    if(s1.value==='all')return;
    SB.summary.regions.filter(function(r){return r.sido===s1.value;})
      .sort(function(a,b){return a.sgg<b.sgg?-1:1;})
      .forEach(function(r){opt(s2,r.code,r.sgg.replace(/_/g,' ')+(r.geo?'':' (준비중)'),!r.geo);});
  }
  s1.addEventListener('change',function(){
    curSido=s1.value;curSgg='all';fill();render();
    var pts=SB.summary.regions.filter(function(r){return r.lat&&regionPass(r);}).map(function(r){return [r.lat,r.lng];});
    if(curSido!=='all'&&pts.length){try{map.fitBounds(pts,{padding:[40,40],maxZoom:12});}catch(e){}}
  });
  s2.addEventListener('change',function(){
    curSgg=s2.value;render();
    var r=SB.summary.regions.find(function(x){return x.code===curSgg;});
    if(r&&r.lat){go(r.lat,r.lng,Z_DETAIL+1);}
  });
  fill();
  /* 지역·동 검색 매칭 — URL 딥링크와 지도 상단 검색창이 공용 */
  function fitSido(sd){
    curSido=sd;curSgg='all';s1.value=sd;fill();
    setTimeout(function(){try{map.invalidateSize();
      var pts=SB.summary.regions.filter(function(r){return r.lat&&regionPass(r);}).map(function(r){return [r.lat,r.lng];});
      if(pts.length)map.fitBounds(pts,{padding:[40,40],maxZoom:12});}catch(e){}},150);
  }
  function findAndGo(pq){
    var tgt=null,handled=false;
    var findR=function(loose){
      return SB.summary.regions.find(function(x){
        if(!x.lat||pq.indexOf(x.sido)<0)return false;
        return x.sgg.split(/[\s_]+/).every(function(p){
          if(pq.indexOf(p)>=0)return true;
          return loose&&p.length>2&&pq.indexOf(p.slice(0,-1))>=0;
        });
      });
    };
    tgt=findR(false)||findR(true);
    if(!tgt&&window.SB&&SB.dongs){
      /* 동 단위: "답십리동"·"답십리"·주소 속 동명 → 동 중심 줌15 */
      var de=null;
      pq.split(/\s+/).forEach(function(w){if(!de&&SB.dongs[w])de=SB.dongs[w];});
      if(!de){
        var qd=pq.replace(/\s+/g,'');
        if(qd.length>=2){
          var dk=Object.keys(SB.dongs).find(function(n){return n===qd||n.indexOf(qd)===0;});
          if(dk)de=SB.dongs[dk];
        }
      }
      if(de){
        var rg=SB.summary.regions.find(function(x){return x.code===de[0];});
        if(rg){
          curSido=rg.sido;curSgg=rg.code;s1.value=rg.sido;fill();s2.value=rg.code;handled=true;
          setTimeout(function(){try{map.invalidateSize();map.setView([de[1],de[2]],15,{animate:false});}catch(err){}},150);
        }
      }
    }
    if(!tgt&&!handled){
      /* 자유 검색: 시도 없이 "송파구"·"분당"·"남양주" 매칭 */
      var qn=pq.replace(/\s+/g,'');
      if(qn.length>=2){
        tgt=SB.summary.regions.find(function(x){
          if(!x.lat)return false;
          return x.sgg.split(/[\s_]+/).some(function(p){return p.indexOf(qn)===0||qn.indexOf(p)>=0;});
        });
      }
    }
    if(!tgt&&!handled){
      /* 시 단위 그룹: "OO시/군" → 해당 시 전체 구 범위 */
      var city=null;
      pq.split(/\s+/).forEach(function(w){var m=w.match(/^(.{2,}?)(특례시|시|군)$/);if(!city&&m)city=m[1];});
      if(city){
        var grp=SB.summary.regions.filter(function(x){
          return pq.indexOf(x.sido)>=0&&x.lat&&x.sgg.split(/[\s_]+/)[0].indexOf(city)===0;});
        if(grp.length){
          curSido=grp[0].sido;curSgg='all';s1.value=curSido;fill();handled=true;
          setTimeout(function(){try{map.invalidateSize();
            if(grp.length===1)map.setView([grp[0].lat,grp[0].lng],Z_DETAIL,{animate:false});
            else map.fitBounds(grp.map(function(r){return [r.lat,r.lng];}),{padding:[40,40],maxZoom:13});}catch(e){}},150);
        }
      }
    }
    if(!tgt&&!handled){
      /* 시도 폴백 */
      var ps=null;
      sidos.forEach(function(x){if(!ps&&pq.indexOf(x)>=0)ps=x;});
      if(ps){fitSido(ps);handled=true;}
    }
    if(tgt){
      curSido=tgt.sido;curSgg=tgt.code;s1.value=tgt.sido;fill();s2.value=tgt.code;handled=true;
      if(tgt.lat)setTimeout(function(){try{map.invalidateSize();map.setView([tgt.lat,tgt.lng],Z_DETAIL+1,{animate:false});}catch(e){}},150);
    }
    if(handled)render();
    return handled;
  }
  /* 딥링크: ?r=시군구코드 | ?q=주소·지역명 | ?s=시도명 */
  try{
    var P=new URLSearchParams(location.search);
    var pr=P.get('r'),pq=P.get('q'),psp=P.get('s');
    if(pr){
      var t0=SB.summary.regions.find(function(x){return x.code===pr;});
      if(t0){
        curSido=t0.sido;curSgg=t0.code;s1.value=t0.sido;fill();s2.value=t0.code;
        if(t0.lat)setTimeout(function(){try{map.invalidateSize();map.setView([t0.lat,t0.lng],Z_DETAIL+1,{animate:false});}catch(e){}},150);
      }
    }else if(pq){
      findAndGo(pq);
    }else if(psp){
      var sm=null;sidos.forEach(function(x){if(!sm&&(x===psp||psp.indexOf(x)>=0))sm=x;});
      if(sm)fitSido(sm);
    }
  }catch(e){}
  /* 지도 상단 검색창 */
  var sfm=document.getElementById('sform');
  if(sfm)sfm.addEventListener('submit',function(e){
    e.preventDefault();
    var v=document.getElementById('sq').value.trim();
    if(!v)return;
    try{if(typeof gtag==='function')gtag('event','region_search',{search_term:v,source:'map'});}catch(_e){}
    if(!findAndGo(v)){
      var st=document.getElementById('stat');
      if(st)st.textContent='"'+v+'" 지역을 찾지 못했습니다 (데이터 확충 중)';
      setFcount('"'+v+'" 지역을 찾지 못했습니다');
    }
  });
})();
/* 범례 */
document.getElementById('legend').innerHTML=Object.keys(TYPE).map(function(t){
  return '<span style="margin-right:8px"><span class="dot" style="background:'+TYPE[t][1]+'"></span>'+TYPE[t][0]+'</span>';
}).join('')+'<br>'+(SB.summary.period?('계약일 '+SB.summary.period.f.replace(/-/g,'.')+' ~ '+SB.summary.period.t.slice(5).replace(/-/g,'.')+' · '):'')+'기준일 '+SB.summary.updated+' · 확대할수록 상세(건물명은 최대 확대 시) · 점선 마커=지번 비공개(동 단위 개략)';
var popLock=false;
map.on('popupopen',function(){popLock=true;});
map.on('popupclose',function(){popLock=false;setTimeout(render,50);});
map.on('moveend zoomend',function(){if(!popLock)render();});
render();
